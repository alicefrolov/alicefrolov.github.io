<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="canonical" href="https://alicefrolov.com/">

    <title>Alice Frolov — Science Writer</title>
    <meta name="description" content="Alice Frolov — science writer focused on longevity science, cellular aging, and epigenetic reprogramming. Open-access publications on OSF.">
    <meta name="author" content="Alice Frolov">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="Alice Frolov — Science Writer">
    <meta property="og:description" content="Science writer focused on longevity science, cellular aging, and epigenetic reprogramming. Open-access publications on OSF.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alicefrolov.com">
    <meta property="og:image" content="https://alicefrolov.com/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Alice Frolov — Science Writer">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Alice Frolov — Science Writer">
    <meta name="twitter:description" content="Science writer focused on longevity science, cellular aging, and epigenetic reprogramming.">
    <meta name="twitter:site" content="@alicefrolov">
    <meta name="twitter:image" content="https://alicefrolov.com/og-image.png">

    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* =====================
           DESIGN TOKENS
        ===================== */
        :root {
            --bg:    #ffffff;
            --bg1:   #fafafa;
            --bg2:   #f4f4f4;
            --line:  #e0e0e0;
            --line2: #ebebeb;
            --ink:   #111111;
            --ink2:  #333333;
            --ink3:  #555555;
            --ink4:  #999999;
            --mono:  'JetBrains Mono', monospace;
            --serif: 'EB Garamond', Georgia, serif;
        }

        /* =====================
           RESET & BASE
        ===================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        /* Respect reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        body {
            font-family: var(--serif);
            background: var(--bg);
            color: var(--ink);
            font-size: 17px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* =====================
           LAYOUT
        ===================== */
        .site {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        /* =====================
           SIDEBAR
        ===================== */
        .sidebar {
            background: var(--bg1);
            border-right: 1px solid var(--line);
            padding: 48px 28px;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .profile-photo-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid var(--line);
            overflow: hidden;
            margin-bottom: 18px;
            background: var(--bg2);
            flex-shrink: 0;
        }
        .profile-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* Fallback if photo fails to load */
        .profile-photo-wrap img[aria-label] {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-photo-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 1.2em;
            color: var(--ink4);
            background: var(--bg2);
        }

        .sidebar-name {
            font-family: var(--serif);
            font-size: 1.45em;
            font-weight: 500;
            line-height: 1.1;
            color: var(--ink);
            letter-spacing: -0.3px;
            margin-bottom: 5px;
        }
        .sidebar-bio {
            font-family: var(--serif);
            font-size: 0.78em;
            color: var(--ink3);
            line-height: 1.55;
            margin-bottom: 7px;
            font-style: italic;
        }
        .sidebar-role {
            font-family: var(--mono);
            font-size: 0.6em;
            color: var(--ink4);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .sidebar-divider {
            width: 100%;
            height: 1px;
            background: var(--line);
            margin: 14px 0;
        }
        .sidebar-section-label {
            font-family: var(--mono);
            font-size: 0.56em;
            color: var(--ink4);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .id-item {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            margin-bottom: 10px;
        }
        .id-icon {
            width: 22px;
            height: 22px;
            border: 1px solid var(--line);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--bg);
        }
        .id-icon svg { width: 11px; height: 11px; }
        .id-label {
            font-family: var(--mono);
            font-size: 0.56em;
            color: var(--ink4);
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 1px;
        }
        .id-value {
            font-family: var(--mono);
            font-size: 0.6em;
            color: var(--ink2);
            text-decoration: none;
            word-break: break-all;
            transition: color 0.12s;
            line-height: 1.4;
            display: block;
        }
        .id-value:hover { color: var(--ink); text-decoration: underline; }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 1px;
            margin-top: auto;
            padding-top: 22px;
        }
        .sidebar-nav a {
            font-family: var(--mono);
            font-size: 0.6em;
            color: var(--ink4);
            text-decoration: none;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 7px 10px;
            border-radius: 2px;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-nav a::before {
            content: '';
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--line);
            flex-shrink: 0;
            transition: background 0.12s;
        }
        .sidebar-nav a:hover,
        .sidebar-nav a.active { color: var(--ink); background: var(--bg2); }
        .sidebar-nav a.active::before { background: var(--ink); }

        /* =====================
           CONTENT
        ===================== */
        .content { padding: 0 52px 80px; }

        section {
            padding: 52px 0 48px;
            border-bottom: 1px solid var(--line2);
            /* Animation handled via JS + IntersectionObserver */
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        section.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        section:last-child { border-bottom: none; }

        .section-head {
            display: flex;
            align-items: baseline;
            gap: 14px;
            margin-bottom: 28px;
        }
        .section-number {
            font-family: var(--mono);
            font-size: 0.58em;
            color: var(--ink4);
            letter-spacing: 2px;
        }
        .section-title {
            font-family: var(--mono);
            font-size: 0.62em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--ink4);
        }

        /* =====================
           ABOUT
        ===================== */
        .hero-layout {
            display: grid;
            grid-template-columns: 1fr 190px;
            gap: 44px;
            align-items: start;
        }
        .hero-text p {
            font-size: 1.08em;
            color: var(--ink2);
            line-height: 1.88;
            margin-bottom: 14px;
        }
        .hero-text p:last-child { margin-bottom: 0; }
        .hero-text p strong { color: var(--ink); font-weight: 500; }
        .hero-text p em { font-style: italic; }

        .bio-art { flex-shrink: 0; }
        .bio-art svg { width: 100%; height: auto; }

        @keyframes helixPulse {
            0%, 100% { opacity: .4 }
            50%       { opacity: .85 }
        }
        .helix-a { animation: helixPulse 3.2s ease-in-out infinite; }
        .helix-b { animation: helixPulse 3.2s ease-in-out infinite; animation-delay: 1.6s; }

        /* =====================
           PUBLICATIONS
        ===================== */
        .pub-category-label {
            font-family: var(--mono);
            font-size: 0.58em;
            color: var(--ink4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .pub-category-rule {
            width: 100%;
            height: 1px;
            background: var(--line);
        }
        .pub-item {
            padding: 20px 0;
            border-bottom: 1px solid var(--line2);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: start;
        }
        .pub-item:last-of-type { border-bottom: none; }
        .pub-title {
            font-size: 1em;
            font-weight: 500;
            color: var(--ink);
            text-decoration: none;
            line-height: 1.45;
            display: block;
            margin-bottom: 6px;
            transition: color 0.12s;
        }
        .pub-title:hover { color: var(--ink3); }
        .pub-abstract {
            font-size: 0.9em;
            color: var(--ink2);
            line-height: 1.8;
            margin-bottom: 6px;
            margin-top: 6px;
            font-style: normal;
        }
        .pub-meta {
            font-family: var(--mono);
            font-size: 0.58em;
            color: var(--ink4);
            line-height: 1.9;
        }
        .pub-meta a { color: var(--ink3); text-decoration: none; }
        .pub-meta a:hover { text-decoration: underline; }
        .pub-badge {
            font-family: var(--mono);
            font-size: 0.54em;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 1px;
            white-space: nowrap;
            align-self: start;
            margin-top: 2px;
            border: 1px solid var(--line);
            color: var(--ink4);
            background: var(--bg1);
        }
        .pub-footer {
            margin-top: 20px;
            font-family: var(--mono);
            font-size: 0.58em;
            color: var(--ink4);
            line-height: 1.9;
        }
        .pub-footer a { color: var(--ink3); text-decoration: none; }
        .pub-footer a:hover { text-decoration: underline; }

        /* =====================
           RESEARCH INTERESTS
        ===================== */
        .interests-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
        }
        .interest-cell {
            background: var(--bg);
            padding: 20px 22px;
            transition: background 0.12s;
        }
        .interest-cell:hover { background: var(--bg1); }
        .interest-title {
            font-size: 0.9em;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 4px;
        }
        .interest-desc {
            font-family: var(--mono);
            font-size: 0.58em;
            color: var(--ink4);
            line-height: 1.7;
        }

        /* =====================
           CV
        ===================== */
        .cv-block {
            border: 1px solid var(--line);
            padding: 26px 30px;
            background: var(--bg1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
        }
        .cv-icon {
            width: 40px;
            height: 52px;
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .cv-meta-label {
            font-family: var(--mono);
            font-size: 0.58em;
            color: var(--ink4);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .cv-meta-name { font-size: 0.9em; color: var(--ink2); font-weight: 500; }
        .cv-meta-date {
            font-family: var(--mono);
            font-size: 0.56em;
            color: var(--ink4);
            margin-top: 2px;
        }
        .cv-download-btn {
            font-family: var(--mono);
            font-size: 0.6em;
            color: var(--ink);
            text-decoration: none;
            padding: 9px 18px;
            border: 1px solid var(--ink);
            border-radius: 1px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.12s;
            white-space: nowrap;
            display: inline-block;
        }
        .cv-download-btn:hover { background: var(--ink); color: var(--bg); }

        /* =====================
           CONTACT
        ===================== */
        .contact-block {
            background: var(--bg1);
            border: 1px solid var(--line);
            padding: 30px 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
        }
        .contact-text p {
            font-size: 1em;
            color: var(--ink2);
            line-height: 1.75;
            margin-bottom: 5px;
        }
        .contact-text p:last-child { margin-bottom: 0; }
        .contact-email {
            font-family: var(--mono);
            font-size: 0.62em;
            color: var(--ink2);
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: color 0.12s;
            border-bottom: 1px solid var(--line);
            padding-bottom: 2px;
        }
        .contact-email:hover { color: var(--ink); border-bottom-color: var(--ink); }

        /* =====================
           FOOTER
        ===================== */
        footer.footer-bar {
            border-top: 1px solid var(--line);
            padding: 15px 52px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg1);
            flex-wrap: wrap;
            gap: 12px;
        }
        .footer-copy {
            font-family: var(--mono);
            font-size: 0.54em;
            color: var(--ink4);
        }
        .footer-links { display: flex; gap: 20px; }
        .footer-links a {
            font-family: var(--mono);
            font-size: 0.54em;
            color: var(--ink4);
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.12s;
        }
        .footer-links a:hover { color: var(--ink); }

        /* =====================
           RESPONSIVE
        ===================== */
        @media (max-width: 900px) {
            .site { grid-template-columns: 1fr; }
            .sidebar {
                position: relative;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--line);
                padding: 32px 20px 24px;
            }
            .sidebar-nav {
                flex-direction: row;
                flex-wrap: wrap;
                padding-top: 0;
                margin-top: 18px;
            }
            .content { padding: 0 20px 60px; }
            footer.footer-bar { padding-left: 20px; padding-right: 20px; }
            .hero-layout { grid-template-columns: 1fr; }
            .bio-art { display: none; }
            .interests-grid { grid-template-columns: 1fr; }
            .contact-block { flex-direction: column; align-items: flex-start; }
        }

        @media (max-width: 480px) {
            .pub-item { grid-template-columns: 1fr; }
            .pub-badge { align-self: auto; width: fit-content; }
            .cv-block { flex-direction: column; }
        }

        /* =====================
           SKIP TO CONTENT (a11y)
        ===================== */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--ink);
            color: var(--bg);
            padding: 8px 16px;
            font-family: var(--mono);
            font-size: 0.7em;
            text-decoration: none;
            z-index: 100;
            transition: top 0.1s;
        }
        .skip-link:focus { top: 0; }
    </style>
</head>
<body>

<!-- Accessibility: skip navigation -->
<a class="skip-link" href="#main-content">Skip to content</a>

<div class="site">

<!-- =====================
     SIDEBAR
===================== -->

    <div class="profile-photo-wrap">
        <img
            src="profile.png"
            alt="Alice Frolov"
            width="80"

            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        >
        <div class="profile-photo-fallback" style="display:none;" aria-hidden="true">AF</div>
    </div>

    <div class="sidebar-name">Alice Frolov</div>
    <div class="sidebar-bio">Writing at the edge of what aging science knows — and imagines.</div>
    <div class="sidebar-role">Science Writer<br>Longevity &amp; Aging Biology</div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label" id="sidebar-ids-label">Identifiers</div>

    <ul aria-labelledby="sidebar-ids-label" style="list-style:none;">
        <li class="id-item">
            <div class="id-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
            </div>
